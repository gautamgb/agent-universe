# LiteLLM proxy — 16GB gateway. Mount as /app/config.yaml.
# Client model names (PRIMARY_MODEL / SCOUT_MODEL in compute .env) must match a model_name below.
# Gemini: uses GEMINI_API_KEY. Ollama: uses OLLAMA_API_BASE (set in docker-compose from .env).

model_list:
  # Legacy alias (default if PRIMARY_MODEL unset)
  # PRIMARY SWITCH: gemini-executive
  # ==========================================================
  
  # --- OPTION B: PRODUCTION (Comment out below and uncomment below to switch) ---
  # - model_name: gemini-executive
  #   litellm_params:
  #     model: gemini/gemini-2.5-pro
  #     api_key: os.environ/GEMINI_API_KEY

  # --- OPTION A: LOCAL TESTING (Current) ---
  - model_name: gemini-executive
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: os.environ/OLLAMA_API_BASE

  # ==========================================================
  # INDIVIDUAL MODELS (Hidden/Reference)
  # ==========================================================
  # - model_name: gemini/gemini-1.5-pro
  #   litellm_params:
  #     model: gemini/gemini-1.5-pro
  #     api_key: os.environ/GEMINI_API_KEY

  # - model_name: gemini/gemini-1.5-flash
  #   litellm_params:
  #     model: gemini/gemini-1.5-flash
  #     api_key: os.environ/GEMINI_API_KEY

  # - model_name: gemini/gemini-2.5-pro
  #   litellm_params:
  #     model: gemini/gemini-2.5-pro
  #     api_key: os.environ/GEMINI_API_KEY

  # Ollama (same strings as PRIMARY_MODEL / SCOUT_MODEL when using local models)
  # Local Ollama Models- 
  - model_name: local-scout
    litellm_params:
      model: ollama/qwen2.5-coder:14b
      api_base: os.environ/OLLAMA_API_BASE
  - model_name: ollama/qwen2.5-coder
    litellm_params:
      model: ollama/qwen2.5-coder
      api_base: os.environ/OLLAMA_API_BASE

  - model_name: ollama/qwen2.5-coder:7b
    litellm_params:
      model: ollama/qwen2.5-coder:7b
      api_base: os.environ/OLLAMA_API_BASE

  # Aliases for compute .env: PRIMARY_MODEL=local-executive SCOUT_MODEL=local-scout
  # Set OLLAMA_API_BASE on the gateway to http://<TAILSCALE_IP_OF_OLLAMA_HOST>:11434 (e.g. 32GB node).
  - model_name: local-executive
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: os.environ/OLLAMA_API_BASE

litellm_settings:
  max_budget: 9.5
  budget_duration: 30d
  cache: true
  cache_params:
    type: redis
    host: redis
    port: "6379"

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
